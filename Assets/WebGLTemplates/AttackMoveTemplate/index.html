<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <!--
      Site name comes from Unity: Edit > Project Settings > Player > Company Name ({{{ COMPANY_NAME }}}).
      Other meta values are replaced at build time from WebGLTemplates/AttackMoveTemplate/webgl-meta-config.json.
    -->
    <title>{{{ COMPANY_NAME }}} | {{{ PRODUCT_NAME }}}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta itemprop="name" content="{{{ PRODUCT_NAME }}}">
    <meta itemprop="image" content="YOUR_OG_IMAGE_URL">
    <meta itemprop="description" content="YOUR_META_DESCRIPTION">
    <meta property="og:title" content="{{{ PRODUCT_NAME }}}" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="YOUR_META_DESCRIPTION">
    <meta property="og:url" content="YOUR_SITE_URL" />
    <meta property="og:image" content="YOUR_OG_IMAGE_URL" />
    <meta property="og:image:alt" content="YOUR_OG_IMAGE_ALT" />
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{{ PRODUCT_NAME }}">
    <meta name="twitter:description" content="YOUR_META_DESCRIPTION">
    <meta name="twitter:image" content="YOUR_OG_IMAGE_URL">
    <meta name="description" content="YOUR_META_DESCRIPTION">
    <!-- iOS-specific meta tags to hide status bar in all orientations -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{{ PRODUCT_NAME }}}">
    <!-- iOS home screen icons - multiple sizes for different devices -->
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-180x180.png" sizes="180x180">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-152x152.png" sizes="152x152">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-144x144.png" sizes="144x144">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-120x120.png" sizes="120x120">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-114x114.png" sizes="114x114">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-76x76.png" sizes="76x76">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-72x72.png" sizes="72x72">
    <link rel="apple-touch-icon" href="TemplateData/apple-icon-57x57.png" sizes="57x57">
    <!-- iOS startup images for splash screen -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Android/Chrome Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* Force pure black background and ensure readability */
      html, body {
        background-color: #000;
        color: #ccc;
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        /* Prevent native gestures and overscroll */
        touch-action: none;
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        -webkit-overflow-scrolling: touch;
        /* Prevent text selection */
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        /* Prevent pull-to-refresh on iOS */
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* iOS safe area support - extend to edges */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        /* Ensure full viewport coverage */
        min-height: -webkit-fill-available;
      }

      #unity-container {
        background-color: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Prevent native gestures */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        /* Prevent context menu */
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        /* Full viewport coverage including safe areas */
        width: 100%;
        height: 100%;
        min-height: -webkit-fill-available;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      #unity-canvas {
        /* Prevent native gestures on canvas */
        touch-action: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        /* Prevent context menu */
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        user-drag: none;
        /* Positioning context for overlay elements */
        position: relative;
      }

      #unity-loading-bar {
        color: #fff;
        text-align: center;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #loading {
        color: #fff;
        font-size: 16px;
        margin-top: 10px;
        -webkit-user-select: none;
        user-select: none;
      }

      #unity-progress-bar-empty {
        background: #333;
      }

      #unity-progress-bar-full {
        background: #0f0;
      }

      #unity-footer {
        color: #aaa;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #unity-warning div {
        color: #fff;
        -webkit-user-select: none;
        user-select: none;
      }

      /* Prevent context menu on all elements */
      * {
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }

    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1024 height=756></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="loading">Loading please wait...</div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer" style="width:1024px;">
        <div id="unity-fullscreen-button"></div>
#if SHOW_DIAGNOSTICS
        <img id="diagnostics-icon" src="TemplateData/webmemd-icon.png">
#endif
        <div id="unity-build-title">{{{ PRODUCT_NAME }}}</div>
      </div>


    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var unique = "?v=BUILD_VERSION";
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}" + unique;
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}" + unique,
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}" + unique,
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}" + unique,
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}" + unique,
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}" + unique,
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

 

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        // Enhanced viewport settings for better landscape behavior
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // Force fullscreen-like behavior on iOS
        // This helps hide the status bar in landscape
        function setFullscreenStyles() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
          
          // Ensure body and html take full viewport
          document.documentElement.style.height = '100%';
          document.documentElement.style.width = '100%';
          document.body.style.height = '100%';
          document.body.style.width = '100%';
          document.body.style.position = 'fixed';
          document.body.style.overflow = 'hidden';
        }
        
        setFullscreenStyles();
        
        // Reapply on orientation change
        window.addEventListener('orientationchange', function() {
          setTimeout(function() {
            setFullscreenStyles();
            // Force a resize event to help with layout recalculation
            window.dispatchEvent(new Event('resize'));
          }, 100);
        });
        
        // Also handle resize events
        window.addEventListener('resize', function() {
          setFullscreenStyles();
        });

        // Prevent default touch behaviors that interfere with game controls
        var lastTouchEnd = 0;
        
        document.addEventListener('touchstart', function(e) {
          if (e.touches.length > 1) {
            e.preventDefault(); // Prevent pinch zoom
          }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
          // Prevent scrolling, pull-to-refresh, and native gestures
          // Unity will handle touch events on the canvas directly
          e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
          // Prevent double-tap zoom
          var now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        }, { passive: false });

        document.addEventListener('touchcancel', function(e) {
          e.preventDefault();
        }, { passive: false });

        // Prevent gesture events (iOS)
        document.addEventListener('gesturestart', function(e) {
          e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturechange', function(e) {
          e.preventDefault();
        }, { passive: false });

        document.addEventListener('gestureend', function(e) {
          e.preventDefault();
        }, { passive: false });

        // Prevent context menu on long press
        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          return false;
        }, { passive: false });

#if SHOW_DIAGNOSTICS
        // position the diagnostics icon in the corner on the canvas
        let diagnostics_icon = document.getElementById("diagnostics-icon");
        diagnostics_icon.style.position = "fixed";
        diagnostics_icon.style.bottom = "10px";
        diagnostics_icon.style.right = "0px";
        canvas.after(diagnostics_icon);
#endif

      } else {
        canvas.style.width = "1024px";
        canvas.style.height = "576px";
        // Prevent context menu on desktop too
        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          return false;
        }, { passive: false });
      }

#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif
      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
#if SHOW_DIAGNOSTICS
                document.getElementById("diagnostics-icon").onclick = () => {
                  unityDiagnostics.openDiagnosticsDiv(unityInstance.GetMetricsInfo);
                };
#endif
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

                // Position replay indicator at bottom of canvas
                window.positionReplayIndicator = function() {
                  const canvas = document.querySelector("#unity-canvas");
                  const indicator = document.getElementById("replay-indicator");
                  if (canvas && indicator) {
                    const canvasRect = canvas.getBoundingClientRect();
                    const containerRect = document.querySelector("#unity-container").getBoundingClientRect();
                    // Position relative to container, but aligned with canvas bottom
                    indicator.style.bottom = (containerRect.bottom - canvasRect.bottom + 10) + "px";
                    indicator.style.left = canvasRect.left + (canvasRect.width / 2) + "px";
                    indicator.style.transform = "translateX(-50%)";
                  }
                };
                
                // Position on load and resize
                window.positionReplayIndicator();
                window.addEventListener('resize', window.positionReplayIndicator);
                window.addEventListener('orientationchange', () => setTimeout(window.positionReplayIndicator, 100));

                // On mobile, attempt to enter fullscreen automatically after a short delay
                // This helps hide browser UI including status bar
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                  // Small delay to ensure Unity is fully loaded
                  setTimeout(function() {
                    // Try to enter fullscreen if supported
                    if (document.documentElement.requestFullscreen) {
                      document.documentElement.requestFullscreen().catch(function(err) {
                        // Fullscreen request failed, but that's okay
                        console.log('Fullscreen request failed:', err);
                      });
                    } else if (document.documentElement.webkitRequestFullscreen) {
                      document.documentElement.webkitRequestFullscreen();
                    } else if (document.documentElement.webkitEnterFullscreen) {
                      // iOS Safari
                      document.documentElement.webkitEnterFullscreen();
                    }
                  }, 1000);
                }

#if DEVELOPMENT_PLAYER
                // Unloading web content from DOM so that browser GC can run can be tricky to get right.
                // This code snippet shows how to correctly implement a Unity content Unload mechanism to a web page.

                // Unloading Unity content enables a web page to reclaim the memory used by Unity, e.g. for
                // the purpose of later loading another Unity content instance on the _same_ web page.

                // When using this functionality, take caution to carefully make sure to clear all JavaScript code,
                // DOM element and event handler references to the old content you may have retained, or
                // otherwise the browser's garbage collector will be unable to reclaim the old page.

                // N.b. Unity content does _not_ need to be manually unloaded when the user is navigating away from
                // the current page to another web page. The browser will take care to clear memory of old visited
                // pages automatically. This functionality is only needed if you want to switch between loading
                // multiple Unity builds on a single web page.
                var quit = document.createElement("button");
                quit.style = "margin-left: 5px; background-color: lightgray; border: none; padding: 5px; cursor: pointer";
                quit.innerHTML = "Unload";
                document.querySelector("#unity-build-title").appendChild(quit);
                quit.onclick = () => {
                  // Quit Unity application execution
                  unityInstance.Quit().then(() => {
                    // Remove DOM elements from the page so GC can run
                    document.querySelector("#unity-container").remove();
                    canvas = null;
                    // Remover script elements from the page so GC can run
                    script.remove();
                    script = null;
                  });
                };
#endif
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>


    
  </body>
</html>
